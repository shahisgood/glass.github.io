/* ---------- Project page ---------- */
function renderProject(v){
  const p = projById(route.id);
  if (!p){ go('home'); return; }
  const notes = state.notes.filter(n => n.project === p.id && !n.archived);
  const done = p.tasks.filter(t => t.done).length;
  const pct = p.tasks.length ? Math.round(done / p.tasks.length * 100) : 0;
  v.innerHTML = `
    <div class="proj-cover" aria-hidden="true"></div>
    <input class="note-title" id="projTitle" value="${esc(p.title)}" placeholder="Project name" aria-label="Project name" spellcheck="false">
    <textarea class="proj-desc" id="projDesc" rows="2" placeholder="What is this project about?" aria-label="Project description">${esc(p.description)}</textarea>
    <div class="meta-bar">
      <select class="select" id="projStatus" aria-label="Project status">
        ${['planned','active','paused','completed','archived'].map(s => `<option value="${s}" ${p.status===s?'selected':''}>${s[0].toUpperCase()+s.slice(1)}</option>`).join('')}
      </select>
      <div class="progress" id="projProg" role="progressbar" aria-valuenow="${pct}" aria-valuemin="0" aria-valuemax="100" aria-label="Task progress"><div id="projBar" style="width:${pct}%"></div></div>
      <span id="projPct" style="font-size:.78rem; color:var(--ink-3); font-weight:550;">${pct}%</span>
      <button class="icon-btn" id="projDel" title="Delete project" aria-label="Delete project" style="margin-left:auto; color:#c4554d;">${ICO.trash}</button>
    </div>

    <div class="section-h"><h2>Tasks</h2><span id="taskCount" style="font-size:.78rem; color:var(--ink-3)">${done} of ${p.tasks.length} done</span></div>
    <div class="set-card glass" style="padding: 8px;">
      <div id="taskList">${p.tasks.map(t => `
        <div class="task-row" data-done="${t.done?1:0}" data-task="${t.id}">
          <button class="task-check" aria-label="${t.done?'Mark incomplete':'Mark complete'}" aria-pressed="${t.done}">${ICO.check}</button>
          <span>${esc(t.text)}</span>
          <button class="row-x icon-btn" style="width:26px;height:26px;opacity:.45" data-del-task="${t.id}" aria-label="Delete task">${ICO.trash}</button>
        </div>`).join('') || '<div class="empty-hint" style="padding:12px">No tasks yet.</div>'}
      </div>
      <div class="task-add" style="padding: 6px;">
        <input id="taskInput" type="text" placeholder="Add a task and press Enter" aria-label="New task">
      </div>
    </div>

    <div class="section-h"><h2>Notes</h2><button class="link-btn" id="projAddNote">New note in project</button></div>
    ${notes.length ? `<div class="grid">${notes.map((n,i) => noteCard(n,i)).join('')}</div>`
      : `<div class="empty-hint" style="padding:4px 2px">No notes in this project yet — create one, or assign an existing note from its details panel.</div>`}
  `;
  $('#projTitle').addEventListener('input', e => { p.title = e.target.value; save(); renderSidebar(); renderCrumbs(); });
  $('#projDesc').addEventListener('input', e => { p.description = e.target.value; save(); });
  $('#projStatus').addEventListener('change', e => { p.status = e.target.value; save(); render(); toast('Status updated'); });
  /* targeted updates: ticking a task animates just that row +
     the progress bar, instead of re-rendering the whole page */
  const taskRowHTML = t => `
    <div class="task-row" data-done="${t.done?1:0}" data-task="${t.id}">
      <button class="task-check" aria-label="${t.done?'Mark incomplete':'Mark complete'}" aria-pressed="${t.done}">${ICO.check}</button>
      <span>${esc(t.text)}</span>
      <button class="row-x icon-btn" style="width:26px;height:26px;opacity:.45" data-del-task="${t.id}" aria-label="Delete task">${ICO.trash}</button>
    </div>`;
  function refreshProgress(){
    const done = p.tasks.filter(t => t.done).length;
    const pct2 = p.tasks.length ? Math.round(done / p.tasks.length * 100) : 0;
    const bar = $('#projBar'), wrap = $('#projProg');
    if (bar){ bar.style.width = pct2 + '%'; wrap.setAttribute('aria-valuenow', pct2); }
    const pl = $('#projPct'); if (pl) pl.textContent = pct2 + '%';
    const tc = $('#taskCount'); if (tc) tc.textContent = `${done} of ${p.tasks.length} done`;
  }
  $('#taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.value.trim()){
      const t = { id: uid(), text: e.target.value.trim(), done: false };
      p.tasks.push(t); save();
      $('#taskList .empty-hint')?.remove();
      $('#taskList').insertAdjacentHTML('beforeend', taskRowHTML(t));
      e.target.value = '';
      refreshProgress();
    }
  });
  $('#projAddNote').addEventListener('click', () => createNote(p.id));
  $('#projDel').addEventListener('click', async () => {
    const linked = state.notes.filter(n => n.project === p.id).length;
    const ok = await glassConfirm({
      title: 'Delete this project?',
      message: `"${p.title}" will be removed${linked ? ` — its ${linked} note${linked !== 1 ? 's' : ''} will be kept and unassigned` : ''}. This can't be undone.`,
      confirmText: 'Delete project'
    });
    if (!ok) return;
    const view = $('#view');
    view.classList.add('deleting');
    await new Promise(r => setTimeout(r, 290));
    state.notes.forEach(n => { if (n.project === p.id) n.project = null; });
    state.projects = state.projects.filter(x => x.id !== p.id);
    save(); go('home'); view.classList.remove('deleting');
    toast('Project deleted');
  });
  $('#taskList').addEventListener('click', e => {
    const del = e.target.closest('[data-del-task]');
    if (del){
      p.tasks = p.tasks.filter(t => t.id !== del.dataset.delTask); save();
      del.closest('.task-row').remove(); refreshProgress(); return;
    }
    const row = e.target.closest('.task-row');
    if (row && e.target.closest('.task-check')){
      const t = p.tasks.find(t => t.id === row.dataset.task);
      t.done = !t.done; save();
      row.dataset.done = t.done ? 1 : 0;
      const cb = row.querySelector('.task-check');
      cb.setAttribute('aria-pressed', t.done);
      cb.setAttribute('aria-label', t.done ? 'Mark incomplete' : 'Mark complete');
      refreshProgress();
    }
  });
}

/* ============================================================
   Editor wiring + slash menu
   ============================================================ */
function wireEditor(n){
  const ed = $('#editor'), title = $('#noteTitle');
  const syncEmpty = () => ed.classList.toggle('is-empty', !ed.textContent.trim() && !ed.querySelector('img,hr,table'));
  syncEmpty();

  title.addEventListener('input', () => {
    n.title = title.value; save(); markDirty();
    renderSidebar(); renderCrumbs();
  });
  /* Notion-style: Tab / Enter / ↓ jumps from the title straight into
     the body — never into the toolbar */
  title.addEventListener('keydown', e => {
    if ((e.key === 'Tab' && !e.shiftKey) || e.key === 'Enter' || e.key === 'ArrowDown'){
      e.preventDefault();
      ed.focus();
      const r = document.createRange();
      r.selectNodeContents(ed); r.collapse(true);
      const s = getSelection(); s.removeAllRanges(); s.addRange(r);
    }
  });
  $('#saveNoteBtn').addEventListener('click', () => saveCurrentNote());

  ed.addEventListener('input', () => {
    syncEmpty();
    n.content = ed.innerHTML; /* draft persists; "modified" waits for Save */
    save();
    markDirty();
    updateLiveCounts(n);
    maybeSlash();
  });

  /* toolbar */
  $$('.tb-btn').forEach(b => b.addEventListener('mousedown', e => e.preventDefault()));
  $$('[data-cmd]').forEach(b => b.addEventListener('click', () => {
    if (b.dataset.cmd === 'hilite'){ applyHilite(state.settings.hlColor); return; }
    document.execCommand(b.dataset.cmd);
    ed.focus();
  }));
  const hlMore = $('#hlMore');
  hlMore.addEventListener('mousedown', e => e.preventDefault());
  hlMore.addEventListener('click', () => openHilitePop(hlMore));

  /* ---------- highlight color popover ----------
     • H button applies the current default color directly
     • caret opens the picker; any pick becomes the new default
     • the wheel keeps the picker open so you can fine-tune       */
  const HL_PRESETS = [
    { name:'Sun',      c:'rgba(255, 222, 120, .55)' },
    { name:'Mint',     c:'rgba(150, 232, 196, .55)' },
    { name:'Sky',      c:'rgba(150, 205, 255, .55)' },
    { name:'Lavender', c:'rgba(205, 178, 255, .55)' },
    { name:'Rose',     c:'rgba(255, 172, 200, .55)' },
  ];
  function applyHilite(color, { close = true } = {}){
    state.settings.hlColor = color;
    const sw = $('#hlSwatch'); if (sw) sw.style.background = color;
    document.execCommand('styleWithCSS', false, true);
    document.execCommand('hiliteColor', false, color);
    if (close){ closeHilitePop(); ed.focus(); }
    n.content = ed.innerHTML; save(); markDirty();
  }
  function closeHilitePop(){ const p = $('#hilitePop'); if (p){ p._cleanup?.(); p.remove(); } }
  function openHilitePop(anchor){
    closeHilitePop();
    const r = anchor.getBoundingClientRect();
    const pop = document.createElement('div');
    pop.id = 'hilitePop';
    pop.className = 'float-menu glass-strong hl-pop';
    pop.setAttribute('role', 'menu');
    pop.setAttribute('aria-label', 'Highlight color');
    pop.style.left = Math.min(r.left, innerWidth - 220) + 'px';
    /* toolbar sits at the bottom now — open the picker above it when below won't fit */
    const below = r.bottom + 8, popH = 238;
    pop.style.top = (below + popH > innerHeight ? Math.max(8, r.top - popH - 8) : below) + 'px';
    pop.innerHTML = `
      <div class="hl-label">Highlight</div>
      <div class="hl-swatches">
        ${HL_PRESETS.map(p => `<button class="hl-swatch" style="background:${p.c}" data-hl="${p.c}" title="${p.name}" aria-label="Highlight ${p.name}"></button>`).join('')}
      </div>
      <div class="hl-label">Pick a tint</div>
      <div class="hl-wheel-wrap"><div class="hl-wheel" id="hlWheel" title="Click a hue" role="slider" aria-label="Custom highlight hue"></div></div>`;
    document.body.appendChild(pop);
    /* keep editor selection alive while interacting with the popover */
    pop.addEventListener('mousedown', e => {
      e.preventDefault(); /* keeps the editor selection alive */
      const sw = e.target.closest('[data-hl]');
      if (sw){ applyHilite(sw.dataset.hl); return; }
      if (e.target.id === 'hlWheel'){
        const wr = e.target.getBoundingClientRect();
        const dx = e.clientX - (wr.left + wr.width/2);
        const dy = e.clientY - (wr.top + wr.height/2);
        const hue = Math.round((Math.atan2(dy, dx) * 180 / Math.PI + 450) % 360);
        applyHilite(`hsla(${hue}, 90%, 76%, .55)`, { close: false });
      }
    });
    const dismiss = ev => {
      if (!pop.contains(ev.target) && !anchor.contains(ev.target)) closeHilitePop();
    };
    const escClose = ev => { if (ev.key === 'Escape') closeHilitePop(); };
    pop._cleanup = () => {
      document.removeEventListener('mousedown', dismiss);
      document.removeEventListener('keydown', escClose);
    };
    setTimeout(() => document.addEventListener('mousedown', dismiss), 0);
    document.addEventListener('keydown', escClose);
  }
  $$('[data-block]').forEach(b => b.addEventListener('click', () => {
    document.execCommand('formatBlock', false, b.dataset.block);
    ed.focus();
  }));

  /* checklist toggling */
  ed.addEventListener('click', e => {
    const li = e.target.closest('ul.checklist > li');
    if (li){
      const r = li.getBoundingClientRect();
      if (e.clientX < r.left + 26){ li.classList.toggle('done'); n.content = ed.innerHTML; n.modified = now(); save(); }
    }
  });

  /* ---------- slash menu ---------- */
  const menu = $('#slashMenu');
  /* {caret} marks where the cursor lands after insertion — you start
     typing inside the block immediately, no placeholder text to delete */
  const BLOCKS = [
    { k:'h1', t:'Heading 1', d:'Large section heading', i:'H₁', html:'<h1>{caret}<br></h1>' },
    { k:'h2', t:'Heading 2', d:'Medium section heading', i:'H₂', html:'<h2>{caret}<br></h2>' },
    { k:'h3', t:'Heading 3', d:'Small section heading', i:'H₃', html:'<h3>{caret}<br></h3>' },
    { k:'list', t:'Bulleted list', d:'Simple list of items', i:'•', html:'<ul><li>{caret}<br></li></ul>' },
    { k:'check', t:'Checklist', d:'Track to-dos inside a note', i:'☑', html:'<ul class="checklist"><li>{caret}<br></li></ul>' },
    { k:'table', t:'Table', d:'2 × 3 starter table', i:'⊞', html:'<table><tr><th>{caret}<br></th><th><br></th></tr><tr><td><br></td><td><br></td></tr><tr><td><br></td><td><br></td></tr></table><p><br></p>' },
    { k:'quote', t:'Quote', d:'Set a line apart', i:'❝', html:'<blockquote>{caret}<br></blockquote>' },
    { k:'code', t:'Code block', d:'Monospaced block', i:'{}', html:'<pre><code>{caret}<br></code></pre><p><br></p>' },
    { k:'callout', t:'Callout', d:'Highlight an idea', i:'💡', html:'<div class="callout"><p>{caret}<br></p></div><p><br></p>' },
    { k:'divider', t:'Divider', d:'Horizontal rule', i:'—', html:'<hr><p>{caret}<br></p>' },
  ];
  let slashOpen = false, slashSel = 0, slashFiltered = BLOCKS;

  function maybeSlash(){
    const sel = getSelection();
    if (!sel.rangeCount || !ed.contains(sel.anchorNode)) return closeSlash();
    const node = sel.anchorNode;
    const text = node.nodeType === 3 ? node.textContent.slice(0, sel.anchorOffset) : '';
    const m = text.match(/(?:^|\s)\/([\w-]*)$/);
    if (m){
      slashFiltered = BLOCKS.filter(b => b.t.toLowerCase().includes(m[1].toLowerCase()));
      if (!slashFiltered.length) return closeSlash();
      slashSel = 0; slashOpen = true;
      const r = sel.getRangeAt(0).getBoundingClientRect();
      menu.hidden = false;
      menu.style.left = Math.min(r.left, innerWidth - 260) + 'px';
      menu.style.top = Math.min(r.bottom + 8, innerHeight - 340) + 'px';
      renderSlash();
    } else closeSlash();
  }
  function renderSlash(){
    menu.innerHTML = slashFiltered.map((b, i) => `
      <button class="fm-item ${i === slashSel ? 'sel' : ''}" data-slash="${b.k}" role="menuitem">
        <span class="fm-ico">${b.i}</span><span>${b.t}<small>${b.d}</small></span>
      </button>`).join('');
  }
  function closeSlash(){ slashOpen = false; menu.hidden = true; }
  function applySlash(k){
    const b = BLOCKS.find(x => x.k === k); if (!b) return;
    const sel = getSelection(); if (!sel.rangeCount) return;
    const node = sel.anchorNode;
    if (node.nodeType === 3){
      const t = node.textContent, off = sel.anchorOffset;
      const m = t.slice(0, off).match(/\/([\w-]*)$/);
      if (m){
        node.textContent = t.slice(0, off - m[0].length) + t.slice(off);
        const r = document.createRange();
        r.setStart(node, off - m[0].length); r.collapse(true);
        sel.removeAllRanges(); sel.addRange(r);
      }
    }
    document.execCommand('insertHTML', false, b.html.replace('{caret}', '<span id="__caret__"></span>'));
    /* move the cursor to the {caret} marker, then remove the marker */
    const mk = ed.querySelector('#__caret__');
    if (mk){
      const r = document.createRange();
      r.setStartBefore(mk); r.collapse(true);
      const s2 = getSelection(); s2.removeAllRanges(); s2.addRange(r);
      mk.remove();
    }
    closeSlash();
    n.content = ed.innerHTML; n.modified = now(); save(); syncEmpty();
  }
  menu.onmousedown = e => {
    e.preventDefault();
    const b = e.target.closest('[data-slash]');
    if (b) applySlash(b.dataset.slash);
  };
  ed.addEventListener('keydown', e => {
    if (slashOpen){
      if (e.key === 'ArrowDown'){ e.preventDefault(); slashSel = (slashSel+1) % slashFiltered.length; renderSlash(); return; }
      if (e.key === 'ArrowUp'){ e.preventDefault(); slashSel = (slashSel-1+slashFiltered.length) % slashFiltered.length; renderSlash(); return; }
      if (e.key === 'Enter'){ e.preventDefault(); applySlash(slashFiltered[slashSel].k); return; }
      if (e.key === 'Escape'){ closeSlash(); return; }
    }
    if (e.key === 'Tab'){ e.preventDefault(); document.execCommand(e.shiftKey ? 'outdent' : 'indent'); }
  });
  ed.addEventListener('blur', () => setTimeout(closeSlash, 150));
}

  rp.onclick = null;
  if (route.page !== 'note'){
    const total = state.notes.filter(n => !n.archived).length;
    const fav = state.notes.filter(n => n.favorite && !n.archived).length;
    const arch = state.notes.filter(n => n.archived).length;
    rp.innerHTML = `
      <div class="rp-section"><div class="rp-label">Workspace</div>
        <div class="rp-row"><span>Notes</span><b>${total}</b></div>
        <div class="rp-row"><span>Projects</span><b>${state.projects.length}</b></div>
        <div class="rp-row"><span>Favorites</span><b>${fav}</b></div>
        <div class="rp-row"><span>Archived</span><b>${arch}</b></div>
      </div>
      <div class="rp-section"><div class="rp-label">Tips</div>

  }
  const n = noteById(route.id); if (!n) return;
  const words = wordCount(n), chars = textOf(n.content).length;
  const reading = Math.max(1, Math.round(words / 220));
  rp.innerHTML = `

      <div style="display:flex; flex-direction:column; gap:4px;">
        <button class="nav-item" id="qaPin">${ICO.pin}<span class="truncate">${n.pinned ? 'Unpin note' : 'Pin note'}</span></button>
        <button class="nav-item" id="qaFav">${n.favorite ? ICO.starFill : ICO.star}<span class="truncate">${n.favorite ? 'Remove favorite' : 'Add to favorites'}</span></button>
        <button class="nav-item" id="qaArch">${ICO.archive}<span class="truncate">${n.archived ? 'Restore from archive' : 'Archive note'}</span></button>
        <button class="nav-item" id="qaDel" style="color:#c4554d">${ICO.trash}<span class="truncate">Delete note</span></button>
      </div>
    </div>
    <div class="rp-section"><div class="rp-label">Icon</div>
      <button class="nav-item" id="qaIcon">${noteIco(n)}<span class="truncate">${n.icon ? 'Change icon' : 'Choose an icon'}</span></button>
      <p style="font-size:.72rem; color:var(--ink-3); margin-top:6px; line-height:1.5;">Shows in the sidebar and on Home — never on the note page itself.</p>
    </div>
    <div class="rp-section"><div class="rp-label">Project</div>
      <select class="select" id="qaProj" style="width:100%" aria-label="Assign to project">
        <option value="">No project</option>
        ${state.projects.map(p => `<option value="${p.id}" ${n.project===p.id?'selected':''}>${esc(p.title)}</option>`).join('')}
      </select>
    </div>
    <div class="rp-section"><div class="rp-label">Tags</div>
      <div class="tag-wrap">${n.tags.map(t => `<span class="tag">${esc(t)}<button data-rm-tag="${esc(t)}" aria-label="Remove tag ${esc(t)}">×</button></span>`).join('') || '<span class="empty-hint" style="padding:0">No tags</span>'}</div>
      ${TAG_PRESETS.filter(t => !n.tags.includes(t)).length ? `
      <div class="rp-label" style="margin-top:12px">Suggestions</div>
      <div class="tag-wrap">${TAG_PRESETS.filter(t => !n.tags.includes(t)).map(t =>
        `<button class="tag ghost" data-add-tag="${esc(t)}" aria-label="Add tag ${esc(t)}">+ ${esc(t)}</button>`).join('')}</div>` : ''}
      <input class="tag-input" id="tagInput" type="text" placeholder="Or write your own, press Enter" aria-label="Add custom tag">
    </div>
    <div class="rp-section"><div class="rp-label">Details</div>
      <div class="rp-row"><span>Words</span><b id="rpWords">${words}</b></div>
      <div class="rp-row"><span>Characters</span><b id="rpChars">${chars}</b></div>
      <div class="rp-row"><span>Reading time</span><b>${reading} min</b></div>
      <div class="rp-row"><span>Created</span><b>${fmtDate(n.created)}</b></div>
      <div class="rp-row"><span>Modified</span><b>${fmtTime(n.modified)}</b></div>
    </div>
    <div class="rp-section"><div class="rp-label">Export</div>
      <button class="nav-item" id="qaPdf">${ICO.note}<span class="truncate">Export as PDF…</span></button>
    </div>`;
  $('#qaPin').addEventListener('click', () => { n.pinned = !n.pinned; save(); render(); toast(n.pinned ? 'Pinned' : 'Unpinned'); });
  $('#qaFav').addEventListener('click', () => { n.favorite = !n.favorite; save(); render(); toast(n.favorite ? 'Added to favorites' : 'Removed from favorites'); });
  $('#qaArch').addEventListener('click', () => { n.archived = !n.archived; save(); toast(n.archived ? 'Archived' : 'Restored'); n.archived ? go('archive') : render(); });
  $('#qaIcon').addEventListener('click', e => openEmojiPicker(e.currentTarget, n));
  $('#qaDel').addEventListener('click', async () => {
    const ok = await glassConfirm({
      title: 'Delete this note?',
      message: `"${n.title || 'Untitled'}" will be removed permanently. This can't be undone.`,
      confirmText: 'Delete note'
    });
    if (!ok) return;
    /* let the note dissolve before leaving it */
    const view = $('#view');
    view.classList.add('deleting');
    await new Promise(r => setTimeout(r, 290));
    state.notes = state.notes.filter(x => x.id !== n.id);
    state.recent = state.recent.filter(x => x !== n.id);
    save(); go('home'); view.classList.remove('deleting');
    toast('Note deleted');
  });
  $('#qaPdf').addEventListener('click', () => openPdfDialog(n));
  $('#qaProj').addEventListener('change', e => { n.project = e.target.value || null; save(); render(); toast(n.project ? 'Moved to project' : 'Removed from project'); });
  $('#tagInput').addEventListener('keydown', e => {
    if (e.key === 'Enter' && e.target.value.trim()){
      const t = e.target.value.trim().toLowerCase().replace(/\s+/g, '-');
      if (!n.tags.includes(t)) n.tags.push(t);
      save(); renderRpanel();
      $('#tagInput')?.focus();
    }
  });
  rp.onclick = e => {
    const rm = e.target.closest('[data-rm-tag]');
    if (rm){ n.tags = n.tags.filter(t => t !== rm.dataset.rmTag); save(); renderRpanel(); return; }
    const ad = e.target.closest('[data-add-tag]');
    if (ad){ if (!n.tags.includes(ad.dataset.addTag)) n.tags.push(ad.dataset.addTag); save(); renderRpanel(); }
  };
}

/* ============================================================
   In-app confirm dialog — native confirm() is blocked in some
   embedded contexts, which silently broke note deletion.
   ============================================================ */
function glassConfirm({ title = 'Are you sure?', message = '', confirmText = 'Delete', cancelText = 'Cancel' } = {}){
  return new Promise(resolve => {
    $('#confirmOverlay')?.remove();
    const ov = document.createElement('div');
    ov.id = 'confirmOverlay';
    ov.className = 'overlay open center';
    ov.setAttribute('role', 'dialog'); ov.setAttribute('aria-modal', 'true');
    ov.setAttribute('aria-label', title);
    ov.innerHTML = `
      <div class="palette glass-strong mini-dialog confirm-dialog">
        <div class="confirm-ico" aria-hidden="true">${ICO.trash}</div>
        <h3>${esc(title)}</h3>
        <p>${esc(message)}</p>
        <div class="row">
          <button class="btn danger" id="cfYes">${esc(confirmText)}</button>
          <button class="btn ghost" id="cfNo">${esc(cancelText)}</button>
        </div>
      </div>`;
    document.body.appendChild(ov);
    const done = val => { ov.remove(); document.removeEventListener('keydown', onKey); resolve(val); };
    const onKey = e => { if (e.key === 'Escape') done(false); };
    ov.addEventListener('mousedown', e => { if (e.target === ov) done(false); });
    $('#cfYes').addEventListener('click', () => done(true));
    $('#cfNo').addEventListener('click', () => done(false));
    document.addEventListener('keydown', onKey);
    $('#cfNo').focus();
  });
}

/* ============================================================
   Command palette
   ============================================================ */
let palOpen = false, palSel = 0, palItems = [];
function openPalette(){
  palOpen = true; palSel = 0;
  $('#paletteOverlay').classList.add('open');
  const inp = $('#palInput'); inp.value = ''; inp.focus();
  buildPalette('');
}
function closePalette(){
  palOpen = false; $('#paletteOverlay').classList.remove('open');
}
function buildPalette(q){
  q = q.trim().toLowerCase();
  const cmds = [
    { t:'New note', sub:'N', i:ICO.plus, run: () => createNote() },
    { t:'New project', sub:'', i:ICO.folder, run: createProject },
    { t:'Go home', sub:'', i:ICO.home, run: () => go('home') },
    { t:'Open favorites', sub:'', i:ICO.star, run: () => go('favorites') },
    { t:'Open archive', sub:'', i:ICO.archive, run: () => go('archive') },
    { t:'Open settings', sub:'', i:ICO.note, run: () => go('settings') },
    { t:`Switch to ${state.settings.theme === 'dark' ? 'light' : 'dark'} theme`, sub:'', i:ICO.clock, run: toggleTheme },
  ];
  /* focus mode only makes sense inside a note */
  if (route.page === 'note') cmds.push({ t:'Toggle focus mode', sub:'Ctrl .', i:ICO.note, run: toggleFocus });
  /* fuzzy: every char of q appears in order */
  const fuzzy = (text) => {
    if (!q) return true;
    text = text.toLowerCase();
    if (text.includes(q)) return true;
    let i = 0;
    for (const c of text){ if (c === q[i]) i++; if (i === q.length) return true; }
    return false;
  };
  const noteHits = state.notes.filter(n => !n.archived && (
    fuzzy(n.title) || n.tags.some(t => fuzzy(t)) || (q.length > 2 && textOf(n.content).toLowerCase().includes(q))
  )).sort((a,b) => b.modified - a.modified).slice(0, 7)
    .map(n => ({ t: n.title || 'Untitled', sub: fmtTime(n.modified), i: noteIco(n), group:'Notes', run: () => go('note', n.id) }));
  const projHits = state.projects.filter(p => fuzzy(p.title) || p.tags.some(t => fuzzy(t))).slice(0, 4)
    .map(p => ({ t: p.title, sub: p.status, i: ICO.folder, group:'Projects', run: () => go('project', p.id) }));
  const cmdHits = cmds.filter(c => fuzzy(c.t)).map(c => ({ ...c, group:'Commands' }));

  palItems = [...noteHits, ...projHits, ...cmdHits];
  if (q && !state.searchHistory.includes(q)){ state.searchHistory = [q, ...state.searchHistory].slice(0, 10); save(); }

  const list = $('#palList');
  if (!palItems.length){ list.innerHTML = `<div class="pal-empty">No matches for "${esc(q)}" — try fewer letters.</div>`; return; }
  let html = '', lastGroup = '';
  palItems.forEach((it, idx) => {
    if (it.group !== lastGroup){ html += `<div class="pal-group">${it.group}</div>`; lastGroup = it.group; }
    html += `<button class="pal-item ${idx === palSel ? 'sel' : ''}" data-pal="${idx}" role="option" aria-selected="${idx===palSel}">${it.i}<span>${esc(it.t)}</span><span class="pi-sub">${esc(it.sub)}</span></button>`;
  });
  list.innerHTML = html;
  list.querySelector('.sel')?.scrollIntoView({ block:'nearest' });
}

function toggleFocus(){
  if (route.page !== 'note') return; /* focus mode lives in notes only */
  const app = $('#app');
  /* measure the topbar so its slide-away animation is exact */
  app.style.setProperty('--topbar-h', $('.topbar').offsetHeight + 'px');
  app.dataset.focus = app.dataset.focus === 'on' ? 'off' : 'on';
  app.classList.remove('peek');
  toast(app.dataset.focus === 'on' ? 'Focus mode — hover the top edge for controls, Ctrl+. to exit' : 'Focus mode off');
}

/* in focus mode, the topbar peeks back in (as an overlay) when the
   pointer nears the top of the window, or when it receives focus */
document.addEventListener('mousemove', e => {
  const app = $('#app');
  if (app.dataset.focus !== 'on') return;
  if (e.clientY <= 26) app.classList.add('peek');
  else if (e.clientY > 120 && !$('.topbar').matches(':hover')) app.classList.remove('peek');
});
document.addEventListener('focusin', e => {
  const app = $('#app');
  if (app.dataset.focus === 'on' && $('.topbar').contains(e.target)) app.classList.add('peek');
});

/* ---------- toolbar reveal ----------
   The dock opens when the pointer nears the bottom edge of the note
   panel (measured against the panel itself, so short documents behave
   exactly like long ones), and closes with a short grace period so it
   never flickers. Keyboard focus inside the dock also keeps it open. */
(() => {
  const content = $('#content'), dock = $('#tbDock');
  content.addEventListener('mousemove', e => {
    if (route.page !== 'note' || !dock.classList.contains('has-tb')) return;
    const r = content.getBoundingClientRect();
    const near = r.bottom - e.clientY <= 64;
    if (near){
      clearTimeout(tbCloseTimer);
      if (!dock._hover){ dock._hover = true; tbSync(); }
    } else if (dock._hover){
      clearTimeout(tbCloseTimer);
      tbCloseTimer = setTimeout(() => { dock._hover = false; tbSync(); }, 240);
    }
  });
  content.addEventListener('mouseleave', () => {
    if (!dock.classList.contains('has-tb')) return;
    clearTimeout(tbCloseTimer);
    tbCloseTimer = setTimeout(() => { dock._hover = false; tbSync(); }, 240);
  });
  dock.addEventListener('focusin', () => { dock._focus = true; tbSync(); });
  dock.addEventListener('focusout', () => {
    setTimeout(() => { dock._focus = dock.contains(document.activeElement); tbSync(); }, 0);
  });
})();

/* the export is a fully self-contained HTML document: its own styles,

  p{ margin: .55em 0; } ul, ol{ margin: .55em 0; padding-left: 1.5em; } li{ margin: .25em 0; }
  blockquote{ margin: 1em 0; padding: 2px 0 2px 16px; border-left: 3px solid ${accent}; color: #555; font-style: italic; }

  pre{ border: 1px solid #dfe2ec; border-radius: 10px; padding: 13px 15px; white-space: pre-wrap; }
  code{ padding: 2px 5px; border-radius: 5px; } pre code{ padding: 0; background: none; }
  hr{ border: none; height: 1px; background: #dfe2ec; margin: 1.8em 0; }

  ul.checklist li::before{ content: ''; position: absolute; left: 0; top: .35em; width: 13px; height: 13px;
                           border: 1.5px solid #9aa1b8; border-radius: 4px; }

  ul.checklist li.done::before{ content: '✓'; color: #fff; background: ${accent}; border-color: ${accent};
                                font: bold 10px/13px sans-serif; text-align: center; }

function openExportTab(html){
  const url = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
  const w = window.open(url, '_blank');
  if (w) toast('Opened — use Share or Print there to save as PDF');
  else toast('Allow pop-ups to export this note');
  setTimeout(() => URL.revokeObjectURL(url), 60000);
}
function printNote(n, mode){
  const html = buildExportHTML(n, mode);
  /* iOS home-screen apps can't show a print dialog — hand the document
     to the system browser where the share sheet offers Print / PDF */
  const standalone = navigator.standalone === true || matchMedia('(display-mode: standalone)').matches;
  if (standalone || typeof window.print !== 'function'){ openExportTab(html); return; }
  const frame = document.createElement('iframe');
  frame.setAttribute('aria-hidden', 'true');
  frame.style.cssText = 'position:fixed; right:0; bottom:0; width:1px; height:1px; border:0; opacity:0; pointer-events:none;';
  let done = false;
  const cleanup = () => { if (done) return; done = true; setTimeout(() => frame.remove(), 400); };
  frame.onload = () => {
    try{
      const w = frame.contentWindow;
      w.onafterprint = cleanup;
      w.focus();
      w.print();
      setTimeout(cleanup, 120000); /* safety net if afterprint never fires */
    }catch(err){ cleanup(); openExportTab(html); }
  };
  document.body.appendChild(frame);
  frame.srcdoc = html;
}

document.addEventListener('click', e => {

  if (note){ go('note', note.dataset.note || note.dataset.openNote); drawerNav(); return; }
  const proj = e.target.closest('[data-proj], [data-open-proj]');
  if (proj){ go('project', proj.dataset.proj || proj.dataset.openProj); drawerNav(); return; }
});

/* ============================================================
   Touch gestures — buttons stay as the failback everywhere.
   · swipe in from the left edge   → open sidebar
   · swipe the sidebar left        → close it
   · swipe in from the right edge  → open details panel
   · swipe the details panel right → close it
   · pull down on content (at top) → search palette
   · swipe up near the bottom      → formatting toolbar (notes)
   · swipe the toolbar down        → hide it
   Mouse/trackpad input is untouched — these are touch events only.
   ============================================================ */
(() => {
  const EDGE = 28;
  let g = null;
  document.addEventListener('touchstart', e => {
    if (e.touches.length !== 1){ g = null; return; }
    const t = e.touches[0];
    const content = $('#content');
    const r = content.getBoundingClientRect();
    g = {
      x: t.clientX, y: t.clientY, fired: false,
      leftEdge: t.clientX <= EDGE,
      rightEdge: t.clientX >= innerWidth - EDGE,
      onSidebar: !!e.target.closest('.sidebar'),
      onRpanel: !!e.target.closest('.rpanel'),
      onDock: !!e.target.closest('#tbDock'),
      inContent: !!e.target.closest('.content'),
      atTop: content.scrollTop <= 0,
      nearBottom: t.clientY > r.bottom - 70
    };
  }, { passive: true });
  document.addEventListener('touchmove', e => {
    if (!g || g.fired || e.touches.length !== 1) return;
    if (document.querySelector('.overlay.open')) return; /* dialogs own the screen */
    const t = e.touches[0];
    const dx = t.clientX - g.x, dy = t.clientY - g.y;
    const ax = Math.abs(dx), ay = Math.abs(dy);
    const fire = fn => { g.fired = true; fn(); };
    if (g.leftEdge && dx > 56 && ax > ay * 1.4) return fire(() => setPane('sidebar', true));
    if (g.rightEdge && dx < -56 && ax > ay * 1.4) return fire(() => setPane('rpanel', true));
    if (g.onSidebar && dx < -56 && ax > ay * 1.4) return fire(() => setPane('sidebar', false));
    if (g.onRpanel && dx > 56 && ax > ay * 1.4) return fire(() => setPane('rpanel', false));
    if (g.onDock && dy > 44 && ay > ax) return fire(() => {
      tbLatch = false; const d = $('#tbDock'); d._hover = false; tbSync();
    });
    if (g.inContent && g.nearBottom && route.page === 'note' && dy < -44 && ay > ax)
      return fire(() => { tbLatch = true; tbSync(); });
    if (g.inContent && g.atTop && dy > 80 && ay > ax * 1.6 && $('#content').scrollTop <= 0)
      return fire(openPalette);
  }, { passive: true });
  document.addEventListener('touchend', () => { g = null; });
})();

$('#newNoteBtn').addEventListener('click', () => createNote());
$('#addNoteSb').addEventListener('click', () => createNote());
$('#addProjSb').addEventListener('click', createProject);
$('#themeToggle').addEventListener('click', toggleTheme);
$('#focusBtn').addEventListener('click', toggleFocus);
$('#openPalette').addEventListener('click', openPalette);
$('#toggleSidebar').addEventListener('click', () => setPane('sidebar', $('#app').dataset.sidebar !== 'open'));
$('#toggleRpanel').addEventListener('click', () => setPane('rpanel', $('#app').dataset.rpanel !== 'open'));
$('#scrim').addEventListener('click', () => {
  if (sbOverlay()) setPane('sidebar', false);
  if (rpOverlay()) setPane('rpanel', false);
});

/* quick tab (touch devices) */
const closeQt = () => { $('#quickTab').classList.remove('open'); $('#qtHandle').setAttribute('aria-expanded', 'false'); };
$('#qtHandle').addEventListener('click', () => {
  const open = $('#quickTab').classList.toggle('open');
  $('#qtHandle').setAttribute('aria-expanded', String(open));
});
$('#qtNew').addEventListener('click', () => { closeQt(); createNote(); });
$('#qtSearch').addEventListener('click', () => { closeQt(); openPalette(); });
$('#qtTheme').addEventListener('click', toggleTheme);
$('#qtFocus').addEventListener('click', () => { closeQt(); toggleFocus(); });

/* phone helpers: floating new-note button; tap the breadcrumbs to
   glide back to the top (iOS status-bar habit) */
$('#fabNew').addEventListener('click', () => createNote());
$('#crumbs').addEventListener('click', () => $('#content').scrollTo({ top: 0, behavior: 'smooth' }));

$('#paletteOverlay').addEventListener('mousedown', e => { if (e.target === e.currentTarget) closePalette(); });
$('#palInput').addEventListener('input', e => { palSel = 0; buildPalette(e.target.value); });
$('#palInput').addEventListener('keydown', e => {
  if (e.key === 'ArrowDown'){ e.preventDefault(); palSel = Math.min(palSel + 1, palItems.length - 1); buildPalette(e.target.value); }
  else if (e.key === 'ArrowUp'){ e.preventDefault(); palSel = Math.max(palSel - 1, 0); buildPalette(e.target.value); }
  else if (e.key === 'Enter'){ e.preventDefault(); const it = palItems[palSel]; if (it){ closePalette(); it.run(); } }
  else if (e.key === 'Escape'){ closePalette(); }
});
$('#palList').addEventListener('click', e => {
  const b = e.target.closest('[data-pal]');
  if (b){ const it = palItems[+b.dataset.pal]; closePalette(); it.run(); }
});

document.addEventListener('keydown', e => {
  const mod = e.metaKey || e.ctrlKey;
  const typing = /INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName) || document.activeElement.isContentEditable;
  if (mod && e.key.toLowerCase() === 'k'){ e.preventDefault(); palOpen ? closePalette() : openPalette(); return; }
  if (mod && e.key === '\\'){ e.preventDefault(); $('#toggleSidebar').click(); return; }
  if (mod && e.key === '.'){ e.preventDefault(); if (route.page === 'note') toggleFocus(); return; }
  if (mod && e.key.toLowerCase() === 's'){ e.preventDefault(); saveCurrentNote(); return; }
  if (mod && e.key.toLowerCase() === 'p'){
    e.preventDefault();
    if (route.page === 'note'){ const n = noteById(route.id); if (n) openPdfDialog(n); }
    return;
  }
  if (e.key === 'Escape' && palOpen){ closePalette(); return; }
  if (!typing && !mod && e.key.toLowerCase() === 'n'){ e.preventDefault(); createNote(); }
});

/* ============================================================
   Init
   ============================================================ */
(async function init(){
  await loadState();
  /* migrate / guard */
  state.settings = Object.assign(defaultState().settings, state.settings || {});
  if (state.settings.accent === 'rose') state.settings.accent = 'crimson';
  if (!ACCENTS[state.settings.accent]) state.settings.accent = 'glacier';
  if (state.settings.accent === 'crimson') state.settings.theme = 'dark'; /* dark-only accent */
  state.ui = Object.assign({ sidebar: true, rpanel: true }, state.ui || {});
  /* keep the reference shortcuts note current with the app */
  const sc = state.notes.find(n =>
    (n.title || '').toLowerCase() === 'keyboard shortcuts' && (n.tags || []).includes('reference'));
  if (sc) sc.content = SHORTCUTS_HTML;
  const app = $('#app');
  app.dataset.sidebar = state.ui.sidebar ? 'open' : 'closed';
  app.dataset.rpanel = state.ui.rpanel ? 'open' : 'closed';
  if (innerWidth < 900) app.dataset.sidebar = 'closed';
  if (innerWidth < 1160) app.dataset.rpanel = 'closed';
  applyDevice();
  syncScrim();
  route.page = state.settings.defaultPage || 'home';
  render();
  /* PWA: offline shell (needs https or localhost; skipped on file://) */
  if ('serviceWorker' in navigator &&
      (location.protocol === 'https:' || ['localhost', '127.0.0.1'].includes(location.hostname))){
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
})();

/* panels become floating drawers on narrow windows — close them when
   the window shrinks past a breakpoint so they don't cover the page */
let lastW = innerWidth;
addEventListener('resize', () => {
  const app = $('#app');
  if (innerWidth < 900 && lastW >= 900) app.dataset.sidebar = 'closed';
  if (innerWidth < 1160 && lastW >= 1160) app.dataset.rpanel = 'closed';
  lastW = innerWidth;
  applyDevice();
  if (state) applySettings(); /* re-evaluate the phone blur cap */
  syncScrim();
});
</script>
